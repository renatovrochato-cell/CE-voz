<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CE Voz">
<title>CE Voz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--ac:#1D9E75;--acl:#d4f0e6;--acd:#0a5c42;--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#262626;--bg4:#333;--tx:#f0f0f0;--tx2:#999;--tx3:#555;--br:#2a2a2a;--red:#e24b4a}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;font-size:15px}
#app{height:100%;display:flex;flex-direction:column;max-width:500px;margin:0 auto}
.hdr{padding:max(env(safe-area-inset-top),14px) 16px 11px;background:var(--bg);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;flex-direction:column;gap:2px}
.hdr-proj{font-size:13px;font-weight:600;color:var(--tx)}
.hdr-step{font-size:11px;color:var(--tx2)}
.hdr-btn{border:1px solid var(--br);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;background:var(--bg2);color:var(--tx2)}
.prog-bar{height:3px;background:var(--bg3);flex-shrink:0}
.prog-fill{height:100%;background:var(--ac);transition:width .4s}
.main{flex:1;display:flex;flex-direction:column;padding:14px 14px 8px;gap:11px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.q-card{background:var(--bg2);border:1px solid var(--br);border-radius:16px;padding:15px;display:flex;flex-direction:column;gap:7px}
.q-ctx{font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.08em}
.q-text{font-size:17px;font-weight:500;color:var(--tx);line-height:1.4}
.q-hint{font-size:12px;color:var(--tx2);line-height:1.5}
.tts-ind{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx2)}
.tts-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1px solid var(--br);border-radius:20px;padding:7px 12px;font-size:13px;cursor:pointer;background:var(--bg2);color:var(--tx2);transition:all .12s;user-select:none;-webkit-user-select:none}
.chip:active{transform:scale(.93)}
.chip.on{background:var(--acl);border-color:var(--ac);color:var(--acd);font-weight:600}
.inp-text{width:100%;height:42px;border-radius:10px;border:1px solid var(--br);background:var(--bg2);color:var(--tx);font-size:15px;padding:0 12px;-webkit-appearance:none;margin-top:4px}
.inp-text:focus{outline:none;border-color:var(--ac)}
.ans-box{background:var(--bg3);border-radius:12px;padding:12px;min-height:48px;font-size:15px;color:var(--tx);line-height:1.5;border:2px solid transparent;transition:border-color .2s;word-break:break-word}
.ans-box.listening{border-color:var(--red)}
.ans-box.done{border-color:var(--ac)}
.ans-ph{color:var(--tx3);font-style:italic}
.mic-row{display:flex;align-items:center;gap:14px;justify-content:center;padding:4px 0}
.mic-main{width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;user-select:none;-webkit-user-select:none;transition:all .18s;flex-shrink:0}
.mic-main.idle{background:var(--bg3);color:var(--tx2)}
.mic-main.on{background:var(--red);color:#fff;animation:pulse 1.1s infinite}
.mic-main.done{background:var(--ac);color:#fff}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,.35)}55%{box-shadow:0 0 0 12px rgba(226,75,74,0)}}
.mic-stop{width:50px;height:50px;border-radius:50%;border:2px solid var(--br);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;user-select:none;-webkit-user-select:none;background:var(--bg2);color:var(--tx2);transition:all .15s;flex-shrink:0}
.mic-stop.active{border-color:var(--red);color:var(--red)}
.mic-label{font-size:11px;color:var(--tx2);text-align:center;min-width:80px}
.bottom{padding:8px 14px max(env(safe-area-inset-bottom),12px);background:var(--bg);border-top:1px solid var(--br);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.btn-next{width:100%;padding:13px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;background:var(--ac);color:#fff;transition:all .15s;user-select:none;-webkit-user-select:none}
.btn-next:active{transform:scale(.97);background:var(--acd)}
.btn-next:disabled{background:var(--bg3);color:var(--tx3)}
.btn-row{display:flex;gap:7px}
.btn-sec{flex:1;padding:9px;border:1px solid var(--br);border-radius:10px;font-size:13px;cursor:pointer;background:var(--bg2);color:var(--tx2);transition:all .12s;user-select:none;-webkit-user-select:none}
.btn-sec:active{background:var(--bg3)}
.screen{display:none;flex-direction:column;height:100%}
.screen.active{display:flex}
.start-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;gap:16px;text-align:center}
.inp{width:100%;height:46px;border-radius:10px;border:1px solid var(--br);background:var(--bg2);color:var(--tx);font-size:15px;padding:0 13px;-webkit-appearance:none}
.inp:focus{outline:none;border-color:var(--ac)}
.sum-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.sum-section{margin-bottom:11px}
.sum-title{font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sum-card{background:var(--bg2);border:1px solid var(--br);border-radius:12px;overflow:hidden}
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 13px;border-bottom:1px solid var(--br);font-size:13px}
.sum-row:last-child{border-bottom:none}
.sum-k{color:var(--tx2);flex-shrink:0;margin-right:8px}
.sum-v{color:var(--tx);font-weight:500;text-align:right;word-break:break-word}
.exp-box{background:var(--bg2);border:1px solid var(--br);border-radius:10px;padding:11px;font-family:monospace;font-size:11px;color:var(--tx2);line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.ve-cards{display:flex;flex-direction:column;gap:10px;margin-top:2px}
.ve-card{background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px}
.ve-card-title{font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.07em}
.ve-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.ve-lbl{font-size:11px;color:var(--tx2);min-width:60px;flex-shrink:0}
.ve-inp{height:36px;border-radius:8px;border:1px solid var(--br);background:var(--bg3);color:var(--tx);font-size:14px;padding:0 9px;width:90px;-webkit-appearance:none}
.ve-inp:focus{outline:none;border-color:var(--ac)}
.ve-inp.wide{width:140px}
.ve-chips{display:flex;flex-wrap:wrap;gap:5px}
.ve-chip{border:1px solid var(--br);border-radius:16px;padding:5px 10px;font-size:12px;cursor:pointer;background:var(--bg3);color:var(--tx2);transition:all .12s;user-select:none;-webkit-user-select:none}
.ve-chip:active{transform:scale(.93)}
.ve-chip.on{background:var(--acl);border-color:var(--ac);color:var(--acd);font-weight:600}
.n-vaos-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:4px}
</style>
</head>
<body>
<div id="app">

<!-- START -->
<div class="screen active" id="scr-start">
  <div class="start-main">
    <div style="font-size:54px">🏗️</div>
    <div style="text-align:center">
      <div style="font-size:24px;font-weight:700;color:var(--tx)">Recolha CE</div>
      <div style="font-size:13px;color:var(--tx2);margin-top:6px;line-height:1.6">Entrevista guiada por voz.<br>A app lê as perguntas. Tu respondes falando.</div>
    </div>
    <div style="width:100%;display:flex;flex-direction:column;gap:9px">
      <div style="font-size:12px;color:var(--tx2)">Nome do projeto</div>
      <input class="inp" id="start-nome" placeholder="Ex: Moradia Silva – Portimão">
      <input class="inp" id="start-morada" placeholder="Morada (opcional)">
    </div>
    <button class="btn-next" onclick="iniciar()" style="width:100%">🎙️ Começar</button>
  </div>
</div>

<!-- ENTREVISTA -->
<div class="screen" id="scr-int">
  <div class="hdr">
    <div class="hdr-l">
      <div class="hdr-proj" id="hdr-proj">—</div>
      <div class="hdr-step" id="hdr-step">Pergunta 1</div>
    </div>
    <div class="hdr-btn" onclick="goSum()">📋 Resumo</div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="main" id="main">
    <div class="q-card">
      <div class="q-ctx" id="q-ctx">Projeto</div>
      <div class="q-text" id="q-text">—</div>
      <div class="q-hint" id="q-hint" style="display:none"></div>
      <div class="tts-ind" id="tts-ind" style="display:none"><div class="tts-dot"></div><span>A ler…</span></div>
    </div>
    <div class="chips" id="chips"></div>
    <div id="extra-wrap" style="display:none">
      <input class="inp-text" id="extra-field" placeholder="Outra opção…">
    </div>
    <div class="mic-row">
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px">
        <button class="mic-main idle" id="mic-btn" onclick="toggleMic()">🎙️</button>
        <div class="mic-label" id="mic-lbl">Toca para gravar</div>
      </div>
      <button class="mic-stop" id="mic-stop" onclick="stopRec()">⏹️</button>
    </div>
    <textarea class="ans-box ans-ph" id="ans-box" rows="3"
      style="resize:none;width:100%;font-family:inherit;font-size:15px"
      oninput="onAnsEdit(this)"
      placeholder="A tua resposta aparece aqui — podes editar ou apagar com o teclado…"></textarea>
    <div class="ve-cards" id="ve-inline-wrap" style="display:none"></div>
  </div>
  <div class="bottom">
    <button class="btn-next" id="btn-next" onclick="next()">Seguinte →</button>
    <div class="btn-row">
      <button class="btn-sec" onclick="prev()">← Voltar</button>
      <button class="btn-sec" onclick="skip()">Saltar</button>
      <button class="btn-sec" onclick="clearAns()">↺ Limpar</button>
    </div>
  </div>
</div>

<!-- RESUMO -->
<div class="screen" id="scr-sum">
  <div class="hdr">
    <div class="hdr-l"><div class="hdr-proj" id="sum-nome">Resumo</div><div class="hdr-step" id="sum-counts">—</div></div>
    <div class="hdr-btn" onclick="voltarInt()">← Continuar</div>
  </div>
  <div class="sum-scroll" id="sum-scroll"></div>
  <div class="bottom">
    <button class="btn-next" onclick="goExp()">📥 Exportar</button>
    <div class="btn-row"><button class="btn-sec" onclick="voltarInt()">← Continuar</button></div>
  </div>
</div>

<!-- EXPORT -->
<div class="screen" id="scr-exp">
  <div class="hdr">
    <div class="hdr-l"><div class="hdr-proj">Exportar</div><div class="hdr-step">Copia e envia ao Claude</div></div>
    <div class="hdr-btn" onclick="show('scr-sum')">← Voltar</div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:9px">
    <div class="exp-box" id="exp-box"></div>
    <button class="btn-next" onclick="copyTxt()">📋 Copiar texto</button>
    <button class="btn-next" style="background:var(--bg3);color:var(--tx)" onclick="shareIt()">📤 Partilhar</button>
    <div style="background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:13px">
      <div style="font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px">📊 Gerar Excel</div>
      <div style="font-size:12px;color:var(--tx2);line-height:1.5;margin-bottom:9px">Cola no Claude — gera .xlsx com folhas estruturadas.</div>
      <button class="btn-next" onclick="copyExcel()">📊 Copiar + instrução Excel</button>
    </div>
    <div id="copy-ok" style="display:none;text-align:center;font-size:14px;color:var(--ac);padding:6px">✅ Copiado!</div>
  </div>
</div>

</div>

<script>
// ═══════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════
const MARCAS_CLIMA=['Daikin','Haier','LG','Mitsubishi Electric','Samsung','Toshiba','Hitachi','Fujitsu','Panasonic','Gree','Midea'];
const MARCAS_AQS=['Vulcano','Junkers','Vaillant','Bosch','Ariston','Rinnai','Haier','Baxi','Ferroli','Thermor'];
const TIPOS_CLIMA=['Split','Multi-split','Bomba de calor ar-ar','Bomba de calor ar-água','Radiadores elétricos','Pavimento radiante','Lareira/recuperador','Sem sistema'];
const ORIENTS=['Norte','Sul','Este','Oeste','NE','NO','SE','SO'];
const DIVS_BASE=[
  'Sala','Sala de estar','Sala de jantar','Cozinha','Kitchenette',
  'Quarto 1','Quarto 2','Quarto 3','Quarto 4','Quarto 5',
  'Casa de banho 1','Casa de banho 2','Casa de banho 3','WC',
  'Hall','Escritório','Garagem','Arrecadação','Lavandaria'
];

// ═══════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════
const D={
  nome:'',morada:'',tipologia:'',pisos:1,peDireitos:{},divisoes:[],
  climaSistemas:[],
  aqsTipo:'',aqsMarcas:[],solar:'',solDet:'',
  ventTipo:'',ventCondutasIS:'',ventCondutasISAbrang:'',ventCondutasISDetalhe:'',
  enuYN:'',enuMedida:'',enuVaosYN:'',enuVaosDim:'',
  espParede:'',espVidros:'',
  divisoesDados:{}
  // divisoesDados[div] = { comprimentos:{Norte:'3.15 m',...}, vaos:[{id:'VE1',larg:'',alt:'',tipo:'',prot:''}] }
};

let qList=[],curQ=0,answers={};
let climaTemp=[];
let expandedDivMedidas=false, expandedDivVaos=false;

// ═══════════════════════════════════════
// CONSTRUÇÃO DAS PERGUNTAS (estrutura base)
// ═══════════════════════════════════════
function buildQs(){
  const qs=[];

  // PROJETO
  qs.push({id:'tipologia',ctx:'Projeto',text:'Qual a tipologia da habitação?',
    chips:['T1','T2','T3','T4','T4+','Serviços','Moradia unifamiliar'],key:'tipologia'});
  qs.push({id:'pisos',ctx:'Projeto',text:'Quantos pisos tem a habitação?',
    chips:['1','2','3','4'],key:'pisos'});

  // DIVISÕES — pergunta única com chips agrupados
  qs.push({id:'divisoes',ctx:'Projeto — Divisões',
    text:'Quais as divisões a levantar?',
    hint:'Seleciona quartos, casas de banho e áreas. Podes também dizer por voz.',
    chips:[
      '|QUARTOS',
      '1 Quarto','2 Quartos','3 Quartos','4 Quartos','5 Quartos',
      '|CASAS DE BANHO',
      '1 Casa de banho','2 Casas de banho','3 Casas de banho','WC','2 WC',
      '|ÁREAS',
      'Sala','Sala de estar','Sala de jantar','Cozinha','Kitchenette',
      'Hall','Escritório','Lavandaria','Garagem','Arrecadação'
    ],
    isDivisoesComplexo:true,
    grpQuartos:['1 Quarto','2 Quartos','3 Quartos','4 Quartos','5 Quartos'],
    grpBanhos:['1 Casa de banho','2 Casas de banho','3 Casas de banho','WC','2 WC'],
    grpAreas:['Sala','Sala de estar','Sala de jantar','Cozinha','Kitchenette','Hall','Escritório','Lavandaria','Garagem','Arrecadação'],
    key:'divisoes'});

  // MARCADOR: expande paredes+vãos por divisão (logo a seguir às divisões)
  qs.push({id:'__div_completo__',isDivCompletoMarker:true});

  // PÉ DIREITO por piso (vem DEPOIS das divisões)
  // marcador: expande dinamicamente conforme nº pisos
  qs.push({id:'__pe__',isPeMarker:true});

  // ESPAÇOS NÃO ÚTEIS
  qs.push({id:'enu-yn',ctx:'Espaços Não Úteis',
    text:'Existem paredes em contacto com espaços não úteis?',
    hint:'Ex: garagem, desvão, arrumos não aquecidos.',
    chips:['Sim','Não'],key:'enuYN'});
  qs.push({id:'enu-medida',ctx:'Espaços Não Úteis',
    text:'Qual a dimensão das paredes em contacto com espaços não úteis?',
    hint:'Orientação e comprimento em metros. Ex: "Norte dois metros, Este três metros"',
    key:'enuMedida',cond:()=>isSim('enu-yn')});
  qs.push({id:'enu-vaos-yn',ctx:'Espaços Não Úteis',
    text:'Existem vãos envidraçados em contacto com espaços não úteis?',
    chips:['Sim','Não'],key:'enuVaosYN',cond:()=>isSim('enu-yn')});
  qs.push({id:'enu-vaos-dim',ctx:'Espaços Não Úteis',
    text:'Qual a dimensão dos vãos em contacto com espaços não úteis?',
    hint:'Largura por altura em metros. Ex: "um vinte por um cinquenta"',
    key:'enuVaosDim',cond:()=>isSim('enu-yn')&&isSim('enu-vaos-yn')});

  // CLIMATIZAÇÃO sistema 1
  qs.push({id:'cl1-tipo',ctx:'Climatização — Sistema 1',
    text:'Qual o 1.º sistema de climatização?',chips:TIPOS_CLIMA,key:'cl1-tipo'});
  qs.push({id:'cl1-marcalocal',ctx:'Climatização — Sistema 1',
    text:'Marca e localização do 1.º sistema?',
    hint:'Seleciona a marca e onde está instalado.',
    chips:[...MARCAS_CLIMA,'|','Sala','Sala de estar','Sala de jantar','Cozinha','Quarto principal','Todos os quartos','Toda a habitação','Escritório'],
    isGrouped:true,isMarcaLocal:true,
    grpMarca:MARCAS_CLIMA,
    grpLocal:['Sala','Sala de estar','Sala de jantar','Cozinha','Quarto principal','Todos os quartos','Toda a habitação','Escritório'],
    extraInp:true,extraPh:'Outra marca…',
    key:'cl1-marcalocal',
    cond:()=>!getAns('cl1-tipo').toLowerCase().includes('sem sistema')});
  qs.push({id:'cl-mais',ctx:'Climatização',
    text:'Existe mais algum sistema de climatização?',chips:['Sim','Não'],key:'cl-mais'});

  // CLIMATIZAÇÃO sistema 2
  qs.push({id:'cl2-tipo',ctx:'Climatização — Sistema 2',
    text:'Qual o 2.º sistema de climatização?',chips:TIPOS_CLIMA,key:'cl2-tipo',cond:()=>isSim('cl-mais')});
  qs.push({id:'cl2-marcalocal',ctx:'Climatização — Sistema 2',
    text:'Marca e localização do 2.º sistema?',
    hint:'Seleciona a marca e onde está instalado.',
    chips:[...MARCAS_CLIMA,'|','Sala','Sala de estar','Sala de jantar','Cozinha','Quarto principal','Todos os quartos','Toda a habitação','Escritório'],
    isGrouped:true,isMarcaLocal:true,
    grpMarca:MARCAS_CLIMA,
    grpLocal:['Sala','Sala de estar','Sala de jantar','Cozinha','Quarto principal','Todos os quartos','Toda a habitação','Escritório'],
    extraInp:true,extraPh:'Outra marca…',
    key:'cl2-marcalocal',
    cond:()=>isSim('cl-mais')&&!getAns('cl2-tipo').toLowerCase().includes('sem sistema')});

  // AQS
  qs.push({id:'aqs-tipo',ctx:'AQS',
    text:'Que sistema de águas quentes sanitárias existe?',
    chips:['Esquentador gás','Caldeira gás','Termoacumulador elétrico','Bomba de calor AQS','Solar térmico + elétrico','Solar térmico + gás','Sem sistema'],
    key:'aqsTipo'});
  qs.push({id:'aqs-marca',ctx:'AQS',
    text:'Qual a marca do sistema AQS?',hint:'Podes escolher mais que uma.',
    chips:MARCAS_AQS,multi:true,extraInp:true,extraPh:'Outra marca…',key:'aqsMarcas'});
  qs.push({id:'solar',ctx:'AQS',
    text:'Tem painéis solares térmicos instalados?',chips:['Sim','Não'],key:'solar'});
  qs.push({id:'solar-det',ctx:'AQS',
    text:'Descreve os painéis solares — coletores, área e marca.',
    hint:'Ex: "dois coletores, quatro metros quadrados, Vulcano"',
    key:'solDet',cond:()=>isSim('solar')});

  // VENTILAÇÃO
  qs.push({id:'vent-tipo',ctx:'Ventilação',
    text:'Que tipo de ventilação geral existe na habitação?',
    chips:['Natural','Mecânica extração','Mecânica insuflação','Mecânica duplo fluxo com recuperação','Híbrida'],
    key:'ventTipo'});
  qs.push({id:'vent-is-tipo',ctx:'Ventilação — Inst. Sanitárias',
    text:'Nas instalações sanitárias existem condutas? Se sim, de que tipo?',
    hint:'Admissão = entrada de ar  |  Exaustão = saída de ar',
    chips:['Só exaustão','Admissão e exaustão','Não existem condutas'],key:'ventCondutasIS'});
  qs.push({id:'vent-is-abrang',ctx:'Ventilação — Inst. Sanitárias',
    text:'As condutas das instalações sanitárias estão em todas ou só em algumas?',
    chips:['Em todas','Só em algumas'],key:'ventCondutasISAbrang',
    cond:()=>!getAns('vent-is-tipo').toLowerCase().includes('não existem')});
  qs.push({id:'vent-is-det',ctx:'Ventilação — Inst. Sanitárias',
    text:'Em quais instalações sanitárias existem as condutas?',
    hint:'Ex: "casa de banho 1 e WC de serviço"',
    key:'ventCondutasISDetalhe',

}

function isSim(qid){return (getAns(qid)||'').toLowerCase().includes('sim');}
function isYes(qid){return (getAns(qid)||'').toLowerCase().includes('sim');}
function getAns(qid){const i=qList.findIndex(q=>q.id===qid);return i>-1?(answers[i]||''):''; }

function parseDivs(raw){
  const t=raw.toLowerCase();
  const parts=raw.split('|||').map(s=>s.trim()).filter(Boolean);
  const out=[];

  // ── quartos: chip "2 Quartos" ou voz "dois quartos" ──
  const chipQ=parts.find(p=>/^\d+\s+quarto/i.test(p));
  let nQ=0;
  if(chipQ) nQ=parseInt(chipQ);
  else{
    const mQ=t.match(/(\d+|um|dois|duas|três|tres|quatro|cinco)\s+quarto/);
    if(mQ) nQ=parseInt(numPT(mQ[1]))||1;
    else if(t.includes('quarto')) nQ=1;
  }
  for(let i=1;i<=nQ;i++) out.push(`Quarto ${i}`);

  // ── casas de banho: chip "2 Casas de banho" ou voz ──
  const chipCB=parts.find(p=>/^\d+\s+casa/i.test(p));
  let nCB=0;
  if(chipCB) nCB=parseInt(chipCB);
  else if(parts.some(p=>/^\d+\s+wc$/i.test(p))){
    nCB=parseInt(parts.find(p=>/^\d+\s+wc$/i.test(p)))||1;
  } else {
    const mCB=t.match(/(\d+|uma|dois|duas|três|tres|quatro)\s+casa/);
    if(mCB) nCB=parseInt(numPT(mCB[1]))||1;
    else if(t.includes('wc')) nCB=1;
    else if(t.includes('casa de banho')) nCB=1;
  }
  if(nCB===1) out.push('WC');
  else for(let i=1;i<=nCB;i++) out.push(i===1?`Casa de banho 1`:`Casa de banho ${i}`);

  // ── áreas sociais ──
  const areas=['Sala de estar','Sala de jantar','Kitchenette','Sala','Cozinha','Hall','Escritório','Lavandaria','Garagem','Arrecadação'];
  for(const a of areas){
    const chipHit=parts.find(p=>p.toLowerCase()===a.toLowerCase());
    const voiceHit=t.includes(a.toLowerCase());
    if(chipHit||voiceHit) out.push(a);
  }

  return out.length?out:['Sala','Cozinha','Quarto 1','WC'];
}

function parseComprimentos(raw){
  const result={};
  const t=numPT(raw);
  const map={norte:'Norte',sul:'Sul',este:'Este',leste:'Este',oeste:'Oeste',ne:'NE',no:'NO',se:'SE',so:'SO'};
  const re=/(\b[a-záéíóúãõâêôç]+\b)\s+([\d.]+)|([\d.]+)\s+(\b[a-záéíóúãõâêôç]+\b)/gi;
  let m;
  while((m=re.exec(t))!==null){
    const word=(m[1]||m[4]||'').toLowerCase();
    const num=m[2]||m[3]||'';
    if(map[word]&&num) result[map[word]]=num+' m';
  }
  if(!Object.keys(result).length){
    const nums=t.match(/[\d.]+/g)||[];
    if(nums.length) result['—']=nums.join(', ')+' m';
  }
  return result;
}

function parseDim(raw){
  // extrai largura e altura: "um vinte por um cinquenta" -> {larg:'1.20', alt:'1.50'}
  const t=numPT(raw);
  const nums=t.match(/[\d.]+/g)||[];
  return {larg:nums[0]||'',alt:nums[1]||''};
}

function renderQ(){

      D.divisoes=parseDivs(getAns('divisoes'));
      expandDivCompleto();
      continue;
    }
    if(q.isPeMarker){
      expandPe();
      continue;
    }

    if(q.cond&&!q.cond()){curQ++;continue;}
    break;
  }
  if(curQ>=qList.length){goSum();return;}
  const q=qList[curQ];

  document.getElementById('q-ctx').textContent=q.ctx;
  document.getElementById('q-text').textContent=q.text;
  const hi=document.getElementById('q-hint');
  hi.style.display=q.hint?'block':'none';
  hi.textContent=q.hint||'';

  // chips
  const cc=document.getElementById('chips');cc.innerHTML='';
  if(q.chips){
    if(q.isGrouped&&!q.isMarcaLocal){

      lbl.style.cssText='width:100%;margin:0 0 2px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em';

      lbl.textContent='Marca';
      cc.appendChild(lbl);
    }
    q.chips.forEach(c=>{
      if(c.startsWith('|')){
        const label=c.slice(1).trim();
        const sep=document.createElement('div');
        sep.style.cssText='width:100%;margin:6px 0 2px;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em';

      }

  const veWrap=document.getElementById('ve-inline-wrap');

  }

function chipTap(val,multi,el){
  if(val.startsWith('|')) return;
  const q=qList[curQ];
  if(q&&q.isVaosInline){
    document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('on'));
    el.classList.add('on');
    answers[curQ]=val;
    setAns(val);
    const wrap=document.getElementById('ve-inline-wrap');
    if(val==='Sem vãos'||val==='0'){
      wrap.style.display='none';
      wrap.innerHTML='';
      if(!D.divisoesDados[q.div]) D.divisoesDados[q.div]={comprimentos:{},vaos:[]};
      D.divisoesDados[q.div].vaos=[];
    } else {
      const n=parseInt(val)||1;
      wrap.style.display='flex';
      renderVaosInline(q.div,n);
    }
    return;
  }
  if(q&&q.isDivisoesComplexo){
    const grpQ=(q.grpQuartos||['1 Quarto','2 Quartos','3 Quartos','4 Quartos','5 Quartos']);
    const grpB=(q.grpBanhos||['1 Casa de banho','2 Casas de banho','3 Casas de banho','WC','2 WC']);
    const gQL=grpQ.map(x=>x.toLowerCase());
    const gBL=grpB.map(x=>x.toLowerCase());
    const isQ=gQL.includes(val.toLowerCase());
    const isCB=gBL.includes(val.toLowerCase());
    const parts=(answers[curQ]||'').split('|||').map(s=>s.trim()).filter(Boolean);
    let filtered;
    if(isQ){
      filtered=parts.filter(p=>!gQL.includes(p.toLowerCase()));
      filtered.unshift(val);
    } else if(isCB){
      filtered=parts.filter(p=>!gBL.includes(p.toLowerCase()));
      const qParts=filtered.filter(p=>gQL.includes(p.toLowerCase()));
      const rest=filtered.filter(p=>!gQL.includes(p.toLowerCase()));
      filtered=[...qParts,val,...rest];
    } else {
      const idx=parts.findIndex(p=>p.toLowerCase()===val.toLowerCase());
      if(idx>-1){filtered=parts.filter((_,i)=>i!==idx);}
      else{filtered=[...parts,val];}
    }
    answers[curQ]=filtered.join('|||');
    document.querySelectorAll('#chips .chip').forEach(c=>{
      const cv=c.textContent.toLowerCase();
      c.classList.toggle('on',filtered.map(f=>f.toLowerCase()).includes(cv));
    });
    setAns(filtered.join('|||'));
    return;
  }
  if(q&&q.isOrientComp){
    // chip de orientação: insere "Norte X.XX, " no campo acumulado
    if(val==='Sem paredes exteriores'){
      setAns(val);
      document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('on'));
      el.classList.add('on');
      return;
    }
    // toggle: se já existe entry para esta orientação remove-a
    const cur=(answers[curQ]||'');
    const regex=new RegExp(val+'\\s+[\\d.]+\\s*(?:m)?','gi');
    if(regex.test(cur)){
      const removed=cur.replace(regex,'').replace(/,\s*,/g,',').replace(/^,\s*/,'').replace(/,\s*$/,'').trim();
      answers[curQ]=removed;
      const box=document.getElementById('ans-box');
      box.value=removed;box.className=removed?'ans-box done':'ans-box ans-ph';
      el.classList.remove('on');
    } else {
      // acrescenta orientação com espaço para user escrever o número
      const prev=(answers[curQ]||'').replace(/Sem paredes exteriores/gi,'').trim();
      const sep=prev?', ':'';
      const next=prev+sep+val+' ';
      answers[curQ]=next;
      const box=document.getElementById('ans-box');
      box.value=next;box.className='ans-box done';
      box.focus();
      // coloca cursor no fim
      box.setSelectionRange(next.length,next.length);
      el.classList.add('on');
    }
    return;
  }
  if(q&&q.isMarcaLocal){
    // grupo marca: single select; grupo local: multi select
    const grpM=(q.grpMarca||[]).map(x=>x.toLowerCase());
    const grpL=(q.grpLocal||[]).map(x=>x.toLowerCase());
    const isMarca=grpM.includes(val.toLowerCase());
    const isLocal=grpL.includes(val.toLowerCase());
    const parts=(answers[curQ]||'').split('|||').map(s=>s.trim()).filter(Boolean);
    let filtered;
    if(isMarca){
      // substitui marca anterior
      filtered=parts.filter(p=>!grpM.includes(p.toLowerCase()));
      filtered.unshift(val);
    } else if(isLocal){
      // toggle local
      const idx=parts.findIndex(p=>p.toLowerCase()===val.toLowerCase());
      if(idx>-1){filtered=parts.filter((_,i)=>i!==idx);}
      else{filtered=[...parts,val];}
    } else filtered=[...parts,val];
    answers[curQ]=filtered.join('|||');
    document.querySelectorAll('#chips .chip').forEach(c=>{
      const cv=c.textContent.toLowerCase();
      c.classList.toggle('on',filtered.map(f=>f.toLowerCase()).includes(cv));
    });
    setAns(filtered.join('|||'));
  } else if(q&&q.isGrouped){
    const grpVidro=['simples','duplo'];
    const grpProt=['persiana','portadas','sem proteção exterior'];
    const isVidro=grpVidro.includes(val.toLowerCase());
    const isProt=grpProt.includes(val.toLowerCase());
    const parts=(answers[curQ]||'').split('|||').map(s=>s.trim()).filter(Boolean);
    const filtered=parts.filter(p=>{
      if(isVidro) return !grpVidro.includes(p.toLowerCase());
      if(isProt) return !grpProt.includes(p.toLowerCase());
      return true;
    });
    filtered.push(val);
    answers[curQ]=filtered.join('|||');
    document.querySelectorAll('#chips .chip').forEach(c=>{
      if(c.textContent==='|') return;
      const cv=c.textContent.toLowerCase();
      c.classList.toggle('on', filtered.map(f=>f.toLowerCase()).includes(cv));
    });
    setAns(filtered.join('|||'));
  } else if(multi){
    const parts=(answers[curQ]||'').split('|||').map(s=>s.trim()).filter(Boolean);
    const idx=parts.findIndex(p=>p.toLowerCase()===val.toLowerCase());
    if(idx>-1){parts.splice(idx,1);el.classList.remove('on');}
    else{parts.push(val);el.classList.add('on');}
    setAns(parts.join('|||'));
  }else{
    document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('on'));
    el.classList.add('on');setAns(val);
  }
}
function setAns(val){
  answers[curQ]=val;
  const box=document.getElementById('ans-box');
  if(val){box.value=val.split('|||').join(', ');box.className='ans-box done';}
  else{box.value='';box.className='ans-box ans-ph';}
}

// ═══════════════════════════════════════
// GUARDAR NO ESTADO
// ═══════════════════════════════════════
function saveToD(key,raw){
  if(!key||raw===undefined) return;
  const v=(raw||'').split('|||').join(', ');
  const arr=(raw||'').split('|||').map(s=>s.trim()).filter(Boolean);

  if(key==='tipologia'){D.tipologia=v;}
  else if(key==='pisos'){const n=parseInt(numPT(v).match(/\d+/)?.[0])||1;D.pisos=n;}
  else if(key==='divisoes'){D.divisoes=parseDivs(raw||'');}
  else if(key.startsWith('peDireito-')){
    const piso=parseInt(key.split('-')[1]);
    const prev=D.peDireitos[piso-1]||'';
    D.peDireitos[piso]=v.toLowerCase().includes('igual')?prev:v;
  }
  else if(key==='enuYN'){D.enuYN=v;}
  else if(key==='enuMedida'){D.enuMedida=v;}
  else if(key==='enuVaosYN'){D.enuVaosYN=v;}
  else if(key==='enuVaosDim'){D.enuVaosDim=v;}
  else if(key==='cl1-tipo'){if(!climaTemp[0])climaTemp[0]={tipo:'',marcas:[],local:[]};climaTemp[0].tipo=v;}
  else if(key==='cl1-marcalocal'){
    if(!climaTemp[0])climaTemp[0]={tipo:'',marcas:[],local:[]};
    const mL=MARCAS_CLIMA.map(x=>x.toLowerCase());
    climaTemp[0].marcas=arr.filter(p=>mL.includes(p.toLowerCase()));
    climaTemp[0].local=arr.filter(p=>!mL.includes(p.toLowerCase()));
  }
  else if(key==='cl1-marca'){if(!climaTemp[0])climaTemp[0]={tipo:'',marcas:[],local:[]};climaTemp[0].marcas=arr;}
  else if(key==='cl1-local'){if(!climaTemp[0])climaTemp[0]={tipo:'',marcas:[],local:[]};climaTemp[0].local=arr;}
  else if(key==='cl2-tipo'){if(!climaTemp[1])climaTemp[1]={tipo:'',marcas:[],local:[]};climaTemp[1].tipo=v;}
  else if(key==='cl2-marcalocal'){
    if(!climaTemp[1])climaTemp[1]={tipo:'',marcas:[],local:[]};
    const mL2=MARCAS_CLIMA.map(x=>x.toLowerCase());
    climaTemp[1].marcas=arr.filter(p=>mL2.includes(p.toLowerCase()));
    climaTemp[1].local=arr.filter(p=>!mL2.includes(p.toLowerCase()));
  }
  else if(key==='cl2-marca'){if(!climaTemp[1])climaTemp[1]={tipo:'',marcas:[],local:[]};climaTemp[1].marcas=arr;}
  else if(key==='cl2-local'){if(!climaTemp[1])climaTemp[1]={tipo:'',marcas:[],local:[]};climaTemp[1].local=arr;}
  else if(key==='aqsTipo'){D.aqsTipo=v;}
  else if(key==='aqsMarcas'){D.aqsMarcas=arr;}
  else if(key==='solar'){D.solar=v;}
  else if(key==='solDet'){D.solDet=v;}
  else if(key==='ventTipo'){D.ventTipo=v;}
  else if(key==='ventCondutasIS'){D.ventCondutasIS=v;}
  else if(key==='ventCondutasISAbrang'){D.ventCondutasISAbrang=v;}
  else if(key==='ventCondutasISDetalhe'){D.ventCondutasISDetalhe=v;}
  else if(key==='espParede'){D.espParede=v;}
  else if(key==='espVidros'){
    // formata como 4-12-4
    const nums=numPT(raw||'').match(/[\d.]+/g)||[];
    D.espVidros=nums.length>=2?nums.join('-'):v;
  }
  else if(key.startsWith('dc-')){
    // dc-{div}-comp  |  dc-{div}-vaos-yn  |  dc-{div}-vaos-n  |  dc-{div}-VEn-dim/tipo/prot
    const rest=key.slice(3);
    const div=D.divisoes.find(d=>rest.startsWith(d+'-'))||rest.split('-')[0];
    if(!div) return;
    const campo=rest.slice(div.length+1);
    if(!D.divisoesDados[div]) D.divisoesDados[div]={comprimentos:{},vaos:[]};
    if(campo==='comp'){
      D.divisoesDados[div].comprimentos=parseComprimentos(raw||'');
    } else if(campo==='vaos'){
      // nova key unificada — VEs já em D.divisoesDados via renderVaosInline
      D.divisoesDados[div].nVaos=parseInt(raw)||0;
    } else if(campo==='vaos-yn'){
      D.divisoesDados[div].vaosYN=v;
    } else if(campo==='vaos-n'){
      D.divisoesDados[div].vaosN=v;
    } else {
      // VE1-dim, VE1-tipo, VE1-prot, VE2-dim…
      const veMatch=campo.match(/^(VE\d+)-(.+)$/);
      if(veMatch){
        const veId=veMatch[1];const vcampo=veMatch[2];
        if(!D.divisoesDados[div].vaos) D.divisoesDados[div].vaos=[];
        let ve=D.divisoesDados[div].vaos.find(x=>x.id===veId);
        if(!ve){ve={id:veId,larg:'',alt:'',tipo:'',prot:''};D.divisoesDados[div].vaos.push(ve);}
        if(vcampo==='dim'){const d2=parseDim(raw||'');ve.larg=d2.larg;ve.alt=d2.alt;}
        else if(vcampo==='tipoprot'){
          const grpV=['simples','duplo'];const grpP=['persiana','portadas','sem proteção exterior'];
          const parts=(raw||'').split('|||').map(s=>s.trim());
          ve.tipo=parts.find(p=>grpV.includes(p.toLowerCase()))||'';
          ve.prot=parts.find(p=>grpP.includes(p.toLowerCase()))||'';
        }
        else if(vcampo==='tipo') ve.tipo=v;
        else if(vcampo==='prot') ve.prot=v;
      }
    }
  }
}

function next(){
  const ew=document.getElementById('extra-wrap');
  const ef=document.getElementById('extra-field');
  if(ew.style.display!=='none'&&ef.value.trim()){
    const cur2=answers[curQ]||'';
    const parts=cur2.split('|||').map(s=>s.trim()).filter(Boolean);
    parts.push(ef.value.trim());answers[curQ]=parts.join('|||');
  }
  const q=qList[curQ];
  if(q&&q.key) saveToD(q.key,answers[curQ]||'');
  D.climaSistemas=climaTemp.filter(c=>c&&c.tipo);
  curQ++;renderQ();
}
function prev(){if(curQ>0){curQ--;renderQ();}}
function skip(){curQ++;renderQ();}
function clearAns(){answers[curQ]='';const box=document.getElementById('ans-box');box.value='';box.className='ans-box ans-ph';document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('on'));const vw=document.getElementById('ve-inline-wrap');vw.style.display='none';vw.innerHTML='';resetMicUI();}

// ═══════════════════════════════════════
// TTS
// ═══════════════════════════════════════
function speak(txt){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  document.getElementById('tts-ind').style.display='flex';
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='pt-PT';u.rate=1.05;u.pitch=1;
  u.onend=()=>document.getElementById('tts-ind').style.display='none';
  u.onerror=()=>document.getElementById('tts-ind').style.display='none';
  window.speechSynthesis.speak(u);
}

// ═══════════════════════════════════════
// STT
// ═══════════════════════════════════════
let rec=null,recOn=false;
function initSpeech(){
  if(rec) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('mic-lbl').textContent='Sem suporte';return;}
  rec=new SR();rec.lang='pt-PT';rec.interimResults=true;rec.continuous=true;
  rec.onresult=e=>{
    let fi='',ii='';
    for(const r of e.results){if(r.isFinal)fi+=r[0].transcript+' ';else ii+=r[0].transcript;}
    if(fi){
      const fc=fi.trim();
      if(/^(seguinte|próximo|proximo|avançar|avancar)$/i.test(fc)){stopRec();setTimeout(()=>next(),300);return;}
      const q=qList[curQ];
      if(q&&q.isVaosInline){
        // voz: "dois", "três", "sem vãos" etc
        const tfc=numPT(fc);
        const nMatch=tfc.match(/\d+/);
        if(nMatch||fc.toLowerCase().includes('sem')){
          const nV=fc.toLowerCase().includes('sem')?0:(parseInt(nMatch[0])||0);
          const val=nV===0?'Sem vãos':String(nV);
          answers[curQ]=val;
          setAns(val);
          document.querySelectorAll('#chips .chip').forEach(c=>c.classList.toggle('on',c.textContent===val));
          const wrap=document.getElementById('ve-inline-wrap');
          if(nV>0){wrap.style.display='flex';renderVaosInline(q.div,nV);}
          else{wrap.style.display='none';wrap.innerHTML='';}
        }
        return;
      }
      if(q&&q.chips){
        const matched=q.chips.filter(c=>!c.startsWith('|')&&fc.toLowerCase().includes(c.toLowerCase()));
        if(matched.length){
          matched.forEach(m=>{
            const parts=(answers[curQ]||'').split('|||').map(s=>s.trim()).filter(Boolean);
            if(!parts.map(p=>p.toLowerCase()).includes(m.toLowerCase())) parts.push(m);
            answers[curQ]=parts.join('|||');
            document.querySelectorAll('#chips .chip').forEach(el=>{if(el.textContent.toLowerCase()===m.toLowerCase()) el.classList.add('on');});
          });
          const box=document.getElementById('ans-box');
          box.value=(answers[curQ]||'').split('|||').join(', ');
          box.className='ans-box done';return;
        }
      }
      if(q&&q.multi){
        const parts=(answers[curQ]||'').split('|||').map(s=>s.trim()).filter(Boolean);
        parts.push(fc);answers[curQ]=parts.join('|||');
      }else answers[curQ]=fc;
      const box=document.getElementById('ans-box');
      box.value=(answers[curQ]||'').split('|||').join(', ');
      box.className='ans-box done';
    }else if(ii){
      const box=document.getElementById('ans-box');
      if(!box.classList.contains('done')) box.value=ii;
    }
  };
  rec.onend=()=>{if(recOn){try{rec.start();}catch(x){}}else resetMicUI();};
  rec.onerror=e=>{if(e.error==='not-allowed'){recOn=false;resetMicUI();document.getElementById('mic-lbl').textContent='⚠️ Permite microfone';}};
}
function toggleMic(){recOn?stopRec():startRec();}
function startRec(){
  if(!rec){initSpeech();if(!rec) return;}
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  recOn=true;
  document.getElementById('mic-btn').className='mic-main on';
  document.getElementById('mic-btn').textContent='⏺';
  document.getElementById('mic-lbl').textContent='A gravar…';
  document.getElementById('mic-stop').classList.add('active');
  document.getElementById('ans-box').classList.add('listening');
  try{rec.start();}catch(x){}
}
function stopRec(){
  recOn=false;if(rec){try{rec.stop();}catch(x){}}
  const has=!!(answers[curQ]);
  document.getElementById('mic-btn').className='mic-main '+(has?'done':'idle');
  document.getElementById('mic-btn').textContent=has?'✅':'🎙️';
  document.getElementById('mic-lbl').textContent=has?'Gravado!':'Toca para gravar';
  document.getElementById('mic-stop').classList.remove('active');
  document.getElementById('ans-box').classList.remove('listening');
}
function resetMicUI(){
  recOn=false;if(rec){try{rec.stop();}catch(x){}}
  document.getElementById('mic-btn').className='mic-main idle';
  document.getElementById('mic-btn').textContent='🎙️';
  document.getElementById('mic-lbl').textContent='Toca para gravar';
  document.getElementById('mic-stop').classList.remove('active');
}

// ═══════════════════════════════════════
// RESUMO
// ═══════════════════════════════════════
function goSum(){
  const q=qList[curQ];if(q&&q.key) saveToD(q.key,answers[curQ]||'');
  D.climaSistemas=climaTemp.filter(c=>c&&c.tipo);
  buildSum();show('scr-sum');
}
function buildSum(){
  const peStr=Object.entries(D.peDireitos).map(([p,v])=>`Piso ${p}: ${v} m`).join(' | ');
  document.getElementById('sum-counts').textContent=`${D.divisoes.length} div. | ${D.climaSistemas.length} clima | ${D.pisos} piso(s)`;
  const row=(k,v)=>v?`<div class="sum-row"><span class="sum-k">${k}</span><span class="sum-v">${v}</span></div>`:'';
  const sec=(t,rows)=>{const r=rows.map(([k,v])=>row(k,v)).join('');return r?`<div class="sum-section"><div class="sum-title">${t}</div><div class="sum-card">${r}</div></div>`:'';}
  let h='';
  const divResumo=D.divisoes.join(', ');
  const nQs=D.divisoes.filter(d=>d.startsWith('Quarto')).length;
  const nCBs=D.divisoes.filter(d=>d.startsWith('Casa de banho')||d==='WC').length;
  h+=sec('Projeto',[['Tipologia',D.tipologia],['Pisos',D.pisos],['Pé direito',peStr],
    ['Quartos',nQs?String(nQs):'—'],['Casas de banho / WC',nCBs?String(nCBs):'—'],
    ['Divisões',divResumo]]);
  (D.climaSistemas||[]).forEach((s,i)=>{h+=sec(`Climatização — Sistema ${i+1}`,[['Tipo',s.tipo],['Marca(s)',s.marcas.join(', ')],['Localização',s.local.join(', ')]]);});
  h+=sec('AQS',[['Sistema',D.aqsTipo],['Marca(s)',(D.aqsMarcas||[]).join(', ')],['Solar',D.solar],['Det.',D.solDet]]);
  h+=sec('Ventilação',[['Sistema',D.ventTipo],['Condutas IS',D.ventCondutasIS],['Abrangência',D.ventCondutasISAbrang],['Detalhe',D.ventCondutasISDetalhe]]);
  h+=sec('Espaços Não Úteis',[['Paredes c/ ENU',D.enuYN],['Medida',D.enuMedida],['Vãos c/ ENU',D.enuVaosYN],['Dimensão vãos',D.enuVaosDim]]);
  h+=sec('Elementos',[['Esp. parede',D.espParede?D.espParede+' cm':''],['Vidro duplo',D.espVidros]]);
  if(D.divisoes.length){
    h+='<div class="sum-section"><div class="sum-title">Divisões</div>';
    for(const div of D.divisoes){
      const dd=D.divisoesDados[div]||{};
      const comps=Object.entries(dd.comprimentos||{}).map(([k,v])=>`${k}: ${v}`).join(', ');
      const vaos=(dd.vaos||[]).map(v=>`${v.id} ${v.larg}×${v.alt}m ${v.tipo} ${v.prot}`).join(' | ');
      const rows=[['Paredes ext.',comps],['Vãos',vaos]].filter(([,v])=>v);
      if(rows.length||comps){
        const r=[...rows].map(([k,v])=>`<div class="sum-row"><span class="sum-k">${k}</span><span class="sum-v">${v}</span></div>`).join('');
        h+=`<div class="sum-card" style="margin-bottom:7px"><div style="font-size:12px;font-weight:700;color:var(--ac);padding:7px 13px 4px;border-bottom:1px solid var(--br)">${div}</div>${r||'<div class="sum-row"><span class="sum-k">—</span></div>'}</div>`;
      }
    }
    h+='</div>';
  }
  document.getElementById('sum-scroll').innerHTML=h||'<p style="color:var(--tx2);font-size:13px;padding:10px">Sem dados.</p>';
}

// ═══════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════
function goExp(){document.getElementById('exp-box').textContent=buildTxt();document.getElementById('copy-ok').style.display='none';show('scr-exp');}
function buildTxt(){
  const d=new Date().toLocaleDateString('pt-PT');
  const peStr=Object.entries(D.peDireitos).map(([p,v])=>`Piso ${p}: ${v}`).join(' | ');
  let t=`CERTIFICADO ENERGÉTICO — RECOLHA DE DADOS\nProjeto: ${D.nome}\nMorada: ${D.morada||'—'}\nData: ${d}\n\n`;
  t+=`=== IDENTIFICAÇÃO ===\nTipologia: ${D.tipologia||'—'}\nPisos: ${D.pisos||'—'}\nPé direito: ${peStr||'—'}\nDivisões: ${D.divisoes.join(', ')||'—'}\n\n`;
  (D.climaSistemas||[]).forEach((s,i)=>{
    t+=`=== CLIMATIZAÇÃO — SISTEMA ${i+1} ===\nTipo: ${s.tipo||'—'}\nMarca(s): ${s.marcas.join(', ')||'—'}\nLocalização: ${s.local.join(', ')||'—'}\n\n`;
  });
  t+=`=== AQS ===\nSistema: ${D.aqsTipo||'—'}\nMarca(s): ${(D.aqsMarcas||[]).join(', ')||'—'}\nSolar: ${D.solar||'—'}`;
  if((D.solar||'').toLowerCase().includes('sim')) t+=`\nDetalhes: ${D.solDet||'—'}`;
  t+=`\n\n=== VENTILAÇÃO ===\nSistema: ${D.ventTipo||'—'}\nCondutas IS: ${D.ventCondutasIS||'—'}\nAbrangência: ${D.ventCondutasISAbrang||'—'}\n`;
  if(D.ventCondutasISDetalhe) t+=`Detalhe: ${D.ventCondutasISDetalhe}\n`;
  t+=`\n=== ESPAÇOS NÃO ÚTEIS ===\nParedes c/ ENU: ${D.enuYN||'—'}\n`;
  if((D.enuYN||'').toLowerCase().includes('sim')){
    t+=`Medida paredes ENU: ${D.enuMedida||'—'}\nVãos c/ ENU: ${D.enuVaosYN||'—'}\n`;
    if((D.enuVaosYN||'').toLowerCase().includes('sim')) t+=`Dimensão vãos ENU: ${D.enuVaosDim||'—'}\n`;
  }
  t+=`\n=== ELEMENTOS GERAIS ===\nEspessura parede exterior: ${D.espParede||'—'} cm\nComposição vidro duplo: ${D.espVidros||'—'}\n\n`;
  t+=`=== DIVISÕES ===`;
  for(const div of D.divisoes){
    const dd=D.divisoesDados[div]||{};
    t+=`\n\n[${div.toUpperCase()}]`;
    const comps=Object.entries(dd.comprimentos||{});
    if(comps.length) t+=`\n  Paredes ext.: ${comps.map(([k,v])=>`${k} ${v}`).join(', ')}`;
    (dd.vaos||[]).forEach(ve=>{
      t+=`\n  ${ve.id}: ${ve.larg}×${ve.alt} m | ${ve.tipo||'—'} | Proteção: ${ve.prot||'—'}`;
    });
  }
  return t;
}
function copyTxt(){doCopy(document.getElementById('exp-box').textContent);}
function copyExcel(){
  const instr=`\n\n---\nCom base nos dados, cria Excel (.xlsx) com folhas:\n1. PROJETO — identificação, pé direito por piso, sistemas clima, AQS, ventilação\n2. PAREDES — Divisão | Orientação | Comprimento (m) | Esp. parede (cm) | ENU\n3. VÃOS — Divisão | ID | Largura (m) | Altura (m) | Tipo vidro | Composição | Proteção solar\n4. ENU — Paredes e vãos contacto espaços não úteis\nFormata cabeçalhos verde escuro, linhas alternadas.`;
  doCopy(buildTxt()+instr);
}
function shareIt(){const t=buildTxt();if(navigator.share){navigator.share({title:'CE '+D.nome,text:t}).catch(()=>doCopy(t));}else doCopy(t);}
function doCopy(t){
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(showOk);}
  else{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showOk();}
}
function showOk(){const el=document.getElementById('copy-ok');el.style.display='block';setTimeout(()=>el.style.display='none',2500);}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function numPT(s){
  return (s||'').toLowerCase()
    .replace(/vírgula|virgula/g,'.').replace(/\bponto\b/g,'.')
    .replace(/\bum\b/g,'1').replace(/\bdois\b/g,'2').replace(/\btrês\b|\btres\b/g,'3')
    .replace(/\bquatro\b/g,'4').replace(/\bcinco\b/g,'5').replace(/\bseis\b/g,'6')
    .replace(/\bsete\b/g,'7').replace(/\boito\b/g,'8').replace(/\bnove\b/g,'9')
    .replace(/\bdez\b/g,'10').replace(/\bonze\b/g,'11').replace(/\bdoze\b/g,'12')
    .replace(/\bvinte\b/g,'20').replace(/\btrinta\b/g,'30').replace(/\bquarenta\b/g,'40')
    .replace(/\bcinquenta\b/g,'50').replace(/\bsessenta\b/g,'60')
    .replace(/\bsetenta\b/g,'70').replace(/\boitenta\b/g,'80').replace(/\bnoventa\b/g,'90')
    .replace(/\bcem\b|\bcento\b/g,'100').replace(/\bduzentos\b/g,'200')
    .replace(/\bpor\b/g,' ');
}
